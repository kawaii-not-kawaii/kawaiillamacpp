name: build-llama-cpp-cuda

on:
  workflow_dispatch:
    inputs:
      llama_ref:
        description: "llama.cpp git ref (branch, tag, or commit)"
        default: "master"
      cuda_arch:
        description: "CUDA architecture(s) (e.g. 86 or 75;86;89)"
        default: "86"
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  push:
    paths:
      - "docker/llama-cpp-cuda/**"
      - ".github/workflows/llama-cpp-cuda.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      LLAMA_REF: ${{ inputs.llama_ref || 'master' }}
      CUDA_ARCH: ${{ inputs.cuda_arch || '86' }}
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk
        run: |
          # CUDA toolkit is large; clear the runner's preinstalled junk.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          docker image prune -af || true
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # Sanitize ref into a docker tag.
          REF_TAG=$(printf '%s' "$LLAMA_REF" | tr '/' '-' | tr -cd 'a-zA-Z0-9._-')
          OWNER=$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/llama-cpp-cuda"
          DATE=$(date +%Y%m%d)
          {
            printf 'image=%s\n' "${IMAGE}"
            printf 'tags=%s,%s,%s\n' \
              "${IMAGE}:latest" \
              "${IMAGE}:${REF_TAG}" \
              "${IMAGE}:${REF_TAG}-${DATE}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/llama-cpp-cuda
          file: docker/llama-cpp-cuda/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
          build-args: |
            LLAMA_REF=${{ env.LLAMA_REF }}
            CUDA_ARCH=${{ env.CUDA_ARCH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          {
            printf '### Built image\n'
            printf '```\n'
            printf '%s\n' "$TAGS" | tr ',' '\n'
            printf '```\n'
          } >> "$GITHUB_STEP_SUMMARY"
